name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync locked environment
        run: uv sync --frozen

      - name: Compile main module
        run: uv run python -m py_compile main.py

      - name: Check CLI help
        run: uv run python -u main.py --help
